<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Vault | Account</title>
    <link rel="stylesheet" href="Style.css">
    <style>
        /* Auth Container Layout */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
            background-color: #f4f6f9;
            padding: 40px 20px;
        }

        .auth-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .auth-toggle {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: bold;
            padding-bottom: 10px;
            cursor: pointer;
            color: #888;
            width: 50%;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            color: #007bff;
            border-bottom: 3px solid #007bff;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-control {
            margin-bottom: 20px;
        }

        .form-control label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-control input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .auth-btn {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background-color: #0056b3;
        }

        .footer-bottom {
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">
          <img src="logo.jpg" style="width: 100px;" alt="Logo">
        </div>
        <div class="navbar-links">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <a href="#">Products</a>
                <div class="dropdown-content">
                    <a href="Products.html">Men</a>
                    <a href="#">Women</a>
                    <a href="#">Baby & Kids</a>
                </div>
            </div>
            <a href="#contact">Contact Us</a>
            <a href="login.html">Login/Register</a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search...">
        </div>
        <div class="social-icons">
            <img src="facebook.png" alt="Facebook">
            <img src="instagram.png" alt="Instagram">
            <img src="twitter.png" alt="Twitter">
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="switchForm('login', this)">Login</button>
                <button class="toggle-btn" onclick="switchForm('register', this)">Register</button>
            </div>

            <form id="login-form" class="auth-form active" onsubmit="handleAuth(event, 'Login')">
                <div class="form-control">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-control">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>

            <form id="register-form" class="auth-form" onsubmit="handleAuth(event, 'Registration')">
                <div class="form-control">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-control">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" required placeholder="name@example.com">
                </div>
                <div class="form-control">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="Create a password">
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-item">
            <h3>Company</h3>
            <p><img src="logo.jpg" style="width: 200px;" alt="Logo"></p>
        </div>
        <div class="footer-item" id="contact">
            <h3>Contact</h3>
            <p>123 Nashik, Maharashtra</p>
            <p>Phone: +91 7972857953</p>
            <p>Email: timevault16@gmail.com</p>
        </div>
        <div class="footer-item">
            <h3>Follow Us</h3>
            <div class="social-icons">
                <img src="facebook.png" alt="Facebook">
                <img src="instagram.png" alt="Instagram">
                <img src="twitter.png" alt="Twitter">
            </div>
        </div>
        <div class="footer-bottom">&copy; 2026 Darshan Sonavane. All rights reserved.</div>
    </footer>

    <script>
        function switchForm(formType, button) {
            // Remove active classes
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            // Add active status to selected tab elements
            button.classList.add('active');
            document.getElementById(`${formType}-form`).classList.add('active');
        }

        function handleAuth(event, type) {
            event.preventDefault();
            alert(`${type} successful!`);
            event.target.reset();
        }
    </script>
</body>
</html>
